name: Publish JS SDK

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry run (skip actual publish)
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      version_type:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Bump version, build, test & publish to npm
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/js/redpill/package-lock.json

      - name: Install dependencies
        working-directory: packages/js/redpill
        run: npm ci

      - name: Lint
        working-directory: packages/js/redpill
        run: npm run lint

      - name: Run tests
        working-directory: packages/js/redpill
        run: npm test

      - name: Build
        working-directory: packages/js/redpill
        run: npm run build

      - name: Bump version
        id: version_bump
        working-directory: packages/js/redpill
        run: |
          NEW_VERSION=$(npm version ${{ inputs.version_type }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag_name=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Commit version bump to JS repo
        run: |
          cd packages/js

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Msalways/red-pill-js.git

          # switch to real branch
          git checkout master

          # sync with remote
          git pull origin master --rebase

          # commit new version
          git add redpill/package.json
          git commit -m "chore(js-sdk): release v${{ steps.version_bump.outputs.new_version }}" || echo "No changes"

          git push origin master

      - name: Create git tag
        run: |
          cd packages/js
          git tag "js-v${{ steps.version_bump.outputs.new_version }}" \
            -m "JS SDK v${{ steps.version_bump.outputs.new_version }}"
          git push origin "js-v${{ steps.version_bump.outputs.new_version }}"

      - name: Update submodule reference in monorepo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/js
          git commit -m "chore: update js submodule to v${{ steps.version_bump.outputs.new_version }}" || echo "No changes"
          git push

      - name: Setup npm authentication
        if: ${{ !inputs.dry_run }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/js/redpill
        run: npm publish --access public

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        working-directory: packages/js/redpill
        run: npm publish --dry-run

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: js-v${{ steps.version_bump.outputs.new_version }}
          name: JS SDK v${{ steps.version_bump.outputs.new_version }}
          generate_release_notes: true
          body: |
            ## Redpill JS SDK v${{ steps.version_bump.outputs.new_version }}

            Install:
            npm install redpillx@${{ steps.version_bump.outputs.new_version }}

            See the README for usage examples.
          token: ${{ secrets.PAT_TOKEN }}