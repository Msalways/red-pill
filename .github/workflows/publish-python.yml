name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip actual publish, use Test PyPI)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version_type:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Bump version, build, test & publish to PyPI
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/python/redpill/pyproject.toml

      - name: Install package + dev deps
        working-directory: packages/python/redpill
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/python/redpill
        run: pytest tests/ -v
      
      - name: Reset submodule to remote state
        run: |
          cd packages/python
          git fetch origin
          git reset --hard ${{ github.ref_name }}
          git clean -fd

      - name: Bump version
        id: version_bump
        working-directory: packages/python/redpill
        run: |
          python - <<'EOF'
          import re, sys

          bump = "${{ inputs.version_type }}"

          with open("src/redpill/__init__.py") as f:
              content = f.read()

          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', content)
          if not match:
              sys.exit("Could not find __version__ in __init__.py")

          old = match.group(1)
          major, minor, patch = map(int, old.split("."))

          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              major, minor, patch = major, minor + 1, 0
          else:
              patch += 1

          new = f"{major}.{minor}.{patch}"
          new_content = content.replace(f'__version__ = "{old}"', f'__version__ = "{new}"')
          new_content = new_content.replace(f"__version__ = '{old}'", f"__version__ = '{new}'")

          with open("src/redpill/__init__.py", "w") as f:
              f.write(new_content)

          # Also update pyproject.toml version
          with open("pyproject.toml") as f:
              toml = f.read()

          toml = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{new}"', toml, count=1)
          with open("pyproject.toml", "w") as f:
              f.write(toml)

          print(f"Bumped {old} → {new}")
          with open("$GITHUB_OUTPUT", "a") as out:
              out.write(f"new_version={new}\n")
              out.write(f"old_version={old}\n")
          EOF

      - name: Build package
        working-directory: packages/python/redpill
        run: |
          pip install build
          python -m build

      - name: Check package
        working-directory: packages/python/redpill
        run: |
          pip install twine
          twine check dist/*

      - name: Commit version bump
        working-directory: packages/python/redpill
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Msalways/red-pill-py.git
          git checkout ${{ github.ref_name }}
          git add src/redpill/__init__.py pyproject.toml
          git commit -m "chore(py-sdk): release v${{ steps.version_bump.outputs.new_version }}"
          git push origin ${{ github.ref_name }}

      - name: Update submodule reference
        run: |
          git submodule update --recursive --remote
          git add packages/python
          git commit -m "chore: update python submodule to v${{ steps.version_bump.outputs.new_version }}"

      - name: Create git tag
        run: |
          git tag "py-v${{ steps.version_bump.outputs.new_version }}" \
            -m "Python SDK v${{ steps.version_bump.outputs.new_version }}"

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        working-directory: packages/python/redpill
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Dry run — publish to Test PyPI
        if: ${{ inputs.dry_run }}
        working-directory: packages/python/redpill
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Push commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "py-v${{ steps.version_bump.outputs.new_version }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "py-v${{ steps.version_bump.outputs.new_version }}"
          name: "Python SDK v${{ steps.version_bump.outputs.new_version }}"
          generate_release_notes: true
          body: |
            ## Redpill Python SDK v${{ steps.version_bump.outputs.new_version }}

            **Install:** `pip install redpill==${{ steps.version_bump.outputs.new_version }}`

            ### Quick start
            ```python
            from redpill import Redpill
            rp = Redpill().llm(your_llm_fn).build()
            result = rp.generate_spec(data=your_data, prompt="show tickets by status")
            ```
          token: ${{ secrets.PAT_TOKEN }}
