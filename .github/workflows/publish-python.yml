name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Publish to TestPyPI instead"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Init submodules
        run: |
          git submodule update --init --recursive

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/python/redpillx/pyproject.toml

      - name: Install dependencies
        working-directory: packages/python/redpillx
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/python/redpillx
        run: |
          pytest tests -v

      - name: Bump version
        id: version_bump
        working-directory: packages/python/redpillx
        run: |
          python << 'EOF'
          import re, sys, os

          bump = "${{ inputs.version_type }}"

          with open("src/redpillx/__init__.py") as f:
              content = f.read()

          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', content)
          if not match:
              sys.exit("Could not find __version__")

          old = match.group(1)
          major, minor, patch = map(int, old.split("."))

          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new = f"{major}.{minor}.{patch}"

          content = content.replace(old, new)

          with open("src/redpillx/__init__.py","w") as f:
              f.write(content)

          with open("pyproject.toml") as f:
              toml = f.read()

          toml = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{new}"', toml)

          with open("pyproject.toml","w") as f:
              f.write(toml)

          print(f"{old} -> {new}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"new_version={new}\n")
          EOF

      - name: Build package
        working-directory: packages/python/redpillx
        run: |
          pip install build
          python -m build

      - name: Validate package
        working-directory: packages/python/redpillx
        run: |
          pip install twine
          twine check dist/*

      - name: Commit version bump in submodule
        working-directory: packages/python
        run: |
          cd redpillx

          git add src/redpillx/__init__.py pyproject.toml
          git commit -m "chore(py-sdk): release v${{ steps.version_bump.outputs.new_version }}" || echo "no changes"

          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }}

      - name: Update parent repo submodule pointer
        run: |
          git add packages/python
          git commit -m "chore: update python sdk to v${{ steps.version_bump.outputs.new_version }}" || echo "no changes"

          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }}

      - name: Create tag safely
        run: |
          TAG="py-v${{ steps.version_bump.outputs.new_version }}"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag $TAG
            git push origin $TAG
          fi

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        working-directory: packages/python/redpillx
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Publish to TestPyPI
        if: ${{ inputs.dry_run }}
        working-directory: packages/python/redpillx
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          twine upload \
            --repository-url https://test.pypi.org/legacy/ \
            dist/*

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: py-v${{ steps.version_bump.outputs.new_version }}
          name: Python SDK v${{ steps.version_bump.outputs.new_version }}
          generate_release_notes: true
          body: |
            ## Redpill Python SDK v${{ steps.version_bump.outputs.new_version }}

            Install:

            pip install redpillx==${{ steps.version_bump.outputs.new_version }}

            Example:

            ```python
            from redpillx import Redpill

            rp = Redpill().llm(your_llm_fn).build()

            result = rp.generate_spec(
                data=your_data,
                prompt="show tickets by status"
            )
            ```
          token: ${{ secrets.PAT_TOKEN }}
