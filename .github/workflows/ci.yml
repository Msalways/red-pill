name: CI

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JavaScript SDK ──────────────────────────────────────────────────────────
  test-js:
    name: JS SDK — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/js/redpill/package-lock.json

      - name: Install dependencies
        working-directory: packages/js/redpill
        run: npm ci

      - name: Type check
        working-directory: packages/js/redpill
        run: npm run lint

      - name: Build
        working-directory: packages/js/redpill
        run: npm run build

      # - name: Test
      #   working-directory: packages/js/redpill
      #   run: npm test

      - name: Check published files
        working-directory: packages/js/redpill
        run: |
          npm pack --dry-run 2>&1 | head -40

  # ─── Python SDK ──────────────────────────────────────────────────────────────
  test-python:
    name: Python SDK — Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: packages/python/redpill/pyproject.toml

      - name: Install package + dev deps
        working-directory: packages/python/redpill
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run type check (mypy)
        working-directory: packages/python/redpill
        run: mypy src/ --ignore-missing-imports || true

      - name: Lint (ruff)
        working-directory: packages/python/redpill
        run: ruff check src/ || true

      # - name: Run tests
      #   working-directory: packages/python/redpill
      #   run: pytest tests/ -v

      - name: Build package (verify it builds)
        working-directory: packages/python/redpill
        run: |
          pip install build
          python -m build --wheel
          pip install twine
          twine check dist/*
